name: Documentation issue
description: Report missing, incorrect, or unclear documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: issue
    attributes:
      label: Documentation issue
      placeholder: Describe what is missing, incorrect, outdated, or unclear
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Affected file or page
      placeholder: e.g. README.md, CONTRIBUTING.md, package README, etc.
    validations:
      required: false

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      placeholder: Describe the change you would like to see
    validations:
      required: false
