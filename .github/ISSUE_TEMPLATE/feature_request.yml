name: Feature request
description: Propose a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Please explain the problem and the expected outcome.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Describe the current limitation or pain point
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the feature or change you would like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Describe any alternatives or workarounds you considered
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Target area
      options:
        - packages/aws-cdk
        - packages/azure-terraform
        - cross-package
    validations:
      required: true

  - type: checkboxes
    id: breaking
    attributes:
      label: Compatibility impact
      options:
        - label: This proposal may change existing generated names or public behavior
        - label: This proposal likely requires documentation updates
        - label: This proposal likely requires tests
