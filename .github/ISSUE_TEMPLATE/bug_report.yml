name: Bug report
description: Report a defect, unexpected behavior, or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce and assess the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear and concise description of the bug
      placeholder: Describe what is happening and why it is wrong
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what actually happened
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproducible example if possible
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - packages/aws-cdk
        - packages/azure-terraform
        - ci/github
        - unknown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, module version, or commit SHA if known
      placeholder: e.g. 0.1.0 or a1b2c3d
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Logs, screenshots, generated names, environment details, etc.
    validations:
      required: false
